<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kartik's Store - Checkout</title>
  <link rel="stylesheet" href="/assets/store.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/">Kartik's Store</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart" class="cart-pill">Cart (<span data-cart-count>0</span>)</a>
        <a href="/admin/products">Admin Products</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    <h1 class="section-title">Checkout</h1>
    <div class="split">
      <section class="card">
        <h3 style="margin-top:0;">Customer Details</h3>
        <div id="checkout-error" class="error-box" style="display:none;margin-bottom:10px;"></div>
        <form id="checkout-form">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div>
              <label for="first_name">First Name</label>
              <input id="first_name" name="first_name" required />
            </div>
            <div>
              <label for="last_name">Last Name</label>
              <input id="last_name" name="last_name" />
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" required />
            </div>
            <div>
              <label for="phone">Phone</label>
              <input id="phone" name="phone" inputmode="numeric" pattern="[0-9]{10,15}" />
            </div>
          </div>
          <label for="address1">Address</label>
          <input id="address1" name="address1" required minlength="4" />
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div>
              <label for="city">City</label>
              <input id="city" name="city" required minlength="2" />
            </div>
            <div>
              <label for="zip">ZIP</label>
              <input id="zip" name="zip" required minlength="4" maxlength="10" />
            </div>
          </div>
          <button type="submit" style="margin-top:12px;">Place Order & Sync to Odoo</button>
        </form>
      </section>
      <aside class="card">
        <h3 style="margin-top:0;">Order Summary</h3>
        <div id="checkout-summary"></div>
      </aside>
    </div>
  </main>

  <script src="/assets/store-common.js"></script>
  <script src="/assets/checkout.js"></script>
</body>
</html>
