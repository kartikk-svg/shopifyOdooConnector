<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kartik's Store - Products</title>
  <link rel="stylesheet" href="/assets/store.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/">Kartik's Store</a>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart" class="cart-pill">Cart (<span data-cart-count>0</span>)</a>
        <a href="/admin/products">Admin Products</a>
      </nav>
    </div>
  </header>

  <main class="container page">
    <h1 class="section-title">All Products</h1>
    <p class="section-muted">Search by name, category, or SKU.</p>
    <div class="search-box">
      <input id="search-products" type="text" placeholder="Search products..." />
    </div>
    <section id="products-grid" class="product-grid"></section>
  </main>

  <script src="/assets/store-common.js"></script>
  <script src="/assets/products.js"></script>
</body>
</html>
